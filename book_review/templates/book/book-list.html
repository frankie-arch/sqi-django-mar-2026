{% extends 'partials/base.html' %}

{% block content %}

<h1 class="fade" style="margin-bottom:30px;">All Books 📚</h1>

<div class="grid">

{% for book in book_list %}

<a href="{% url 'book:book_details' book.pk %}" class="book-link">

<div class="book-card fade">

    <div class="img-box">
        {% if book.cover_image %}
            <img src="{{ book.cover_image.url }}">
        {% else %}
            <img src="/static/default_book.jpg">
        {% endif %}
    </div>

    <div class="card-body">
        <h3>{{ book.title }}</h3>
        <p>{{ book.author }}</p>
    </div>

</div>

</a>

{% endfor %}

</div>

<style>

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit, minmax(200px,1fr));
gap:25px;
}

/* LINK RESET */
.book-link{
text-decoration:none;
color:white;
}

/* CARD */
.book-card{
background:#18181f;
border-radius:12px;
overflow:hidden;
transition:0.3s;
cursor:pointer;
}

.book-card:hover{
transform:translateY(-10px) scale(1.03);
box-shadow:0 15px 30px rgba(0,0,0,0.6);
}

/* IMAGE */
.img-box img{
width:100%;
height:250px;
object-fit:cover;
}

/* BODY */
.card-body{
padding:15px;
}

.card-body h3{
font-size:16px;
margin-bottom:5px;
}

.card-body p{
font-size:13px;
color:#aaa;
}

</style>

{% endblock %}
