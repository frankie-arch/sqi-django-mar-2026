{% extends 'partials/base.html' %}

{% block content %}

<h1 class="page-title fade">All Recipes 🍽️</h1>

<div class="grid">

{% for recipe in all_recipe %}
<a href="{% url 'recipe:recipe_details' recipe.id %}">
<div class="recipe-card fade">

    <div class="img-container">
        <img src="{{ recipe.image.url }}" alt="{{ recipe.name }}">

        <div class="overlay">
            <span>View Recipe</span>
        </div>

        <div class="time-badge">
            ⏱ {{ recipe.cooking_time }} mins
        </div>
    </div>

    <div class="card-body">
        <div class="card-title">{{ recipe.name }}</div>
    </div>

</div>

{% empty %}

<p>No recipes available.</p>
</a>
{% endfor %}

</div>

<style>

/* TITLE */
.page-title{
margin-bottom:30px;
}

/* CARD */
.recipe-card{
background:#18181f;
border-radius:12px;
overflow:hidden;
transition:0.3s;
cursor:pointer;
}

.recipe-card:hover{
transform:translateY(-8px);
box-shadow:0 15px 30px rgba(0,0,0,0.6);
}

/* IMAGE */
.img-container{
position:relative;
}

.img-container img{
width:100%;
height:220px;
object-fit:cover;
}

/* OVERLAY */
.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:flex;
align-items:center;
justify-content:center;
opacity:0;
transition:0.3s;
}

.overlay span{
background:#ff7b00;
padding:10px 20px;
border-radius:20px;
}

.recipe-card:hover .overlay{
opacity:1;
}

/* TIME BADGE */
.time-badge{
position:absolute;
top:10px;
right:10px;
background:#ff7b00;
padding:5px 10px;
border-radius:15px;
font-size:12px;
}

/* BODY */
.card-body{
padding:15px;
}

.card-title{
font-size:16px;
font-weight:500;
}

</style>

<script>

// OPTIONAL: CLICK EFFECT (go to detail page later)
const cards = document.querySelectorAll('.recipe-card');

cards.forEach(card => {
    card.addEventListener('click', () => {
        card.style.transform = 'scale(0.98)';
        setTimeout(() => {
            card.style.transform = '';
        }, 150);
    });
});

</script>

{% endblock %}
