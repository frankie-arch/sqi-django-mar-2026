{% extends 'partials/base.html' %}

{% block content %}

<div class="recipe-detail fade">

    <!-- COVER IMAGE -->
    <div class="cover-section">
        <img src="{{ recipe.cover_image.url }}" alt="{{ recipe.name }}">

        <div class="cover-overlay">
            <h1>{{ recipe.name }}</h1>
            <p>⏱ {{ recipe.cooking_time }} mins</p>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="recipe-content">

        <!-- INGREDIENTS -->
        <div class="section">
            <h2>Ingredients 🥕</h2>
            <p>{{ recipe.ingredients|linebreaks }}</p>
        </div>

        <!-- INSTRUCTIONS -->
        <div class="section">
            <h2>Instructions 👨‍🍳</h2>
            <p>{{ recipe.instructions|linebreaks }}</p>
        </div>

    </div>

</div>

<style>

/* CONTAINER */
.recipe-detail{
display:flex;
flex-direction:column;
gap:40px;
}

/* COVER */
.cover-section{
position:relative;
height:350px;
border-radius:12px;
overflow:hidden;
}

.cover-section img{
width:100%;
height:100%;
object-fit:cover;
}

/* OVERLAY */
.cover-overlay{
position:absolute;
bottom:0;
left:0;
width:100%;
padding:30px;
background:linear-gradient(to top, rgba(0,0,0,0.8), transparent);
}

.cover-overlay h1{
font-size:32px;
margin-bottom:5px;
}

.cover-overlay p{
color:#ccc;
}

/* CONTENT */
.recipe-content{
display:flex;
flex-direction:column;
gap:30px;
}

/* SECTION */
.section{
background:#18181f;
padding:20px;
border-radius:10px;
transition:0.3s;
}

.section:hover{
transform:translateY(-5px);
box-shadow:0 10px 20px rgba(0,0,0,0.5);
}

.section h2{
margin-bottom:10px;
color:#ff7b00;
}

/* TEXT */
.section p{
line-height:1.7;
color:#ddd;
}

</style>

<script>

// SMOOTH SCROLL EFFECT FOR SECTIONS
const sections = document.querySelectorAll('.section');

sections.forEach(sec => {
    sec.addEventListener('mouseenter', () => {
        sec.style.transform = 'scale(1.02)';
    });

    sec.addEventListener('mouseleave', () => {
        sec.style.transform = 'scale(1)';
    });
});

// IMAGE ZOOM EFFECT
const cover = document.querySelector('.cover-section img');

if(cover){
    cover.addEventListener('mousemove', (e)=>{
        cover.style.transform = 'scale(1.05)';
    });

    cover.addEventListener('mouseleave', ()=>{
        cover.style.transform = 'scale(1)';
    });
}

</script>

{% endblock %}
