{% extends "partials/base.html" %}

{% block content %}
<h2>Add New Recipe 🍲</h2>

<form method="POST" enctype="multipart/form-data">
{% csrf_token %}

{{ recipe.as_p }}

<button type="submit" class="submit-btn">Add Recipe</button>
</form>

<style>
/* BUTTON */
.submit-btn{
margin-top:15px;
padding:12px;
border:none;
border-radius:30px;
background:#ff7b00;
color:white;
cursor:pointer;
transition:0.3s;
}

.submit-btn:hover{
background:#e66a00;
transform:scale(1.05);
}
</style>
{% endblock %}
