{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SoundWave Music Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f0f12;
color:white;
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 80px;
background:#121217;
border-bottom:1px solid #2a2a2a;
}

.logo{
font-size:22px;
font-weight:600;
color:#1db954;
}

nav ul{
display:flex;
gap:35px;
list-style:none;
}

nav a{
text-decoration:none;
color:#ddd;
font-size:15px;
transition:0.3s;
}

nav a:hover{
color:#1db954;
}

/* CONTAINER */

.container{
width:90%;
max-width:1200px;
margin:auto;
padding:40px 0;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:30px;
}

/* CARDS */

.card{
background:#18181f;
border-radius:10px;
overflow:hidden;
transition:0.3s;
cursor:pointer;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card-body{
padding:15px;
}

.card-title{
font-size:16px;
font-weight:500;
}

.card-sub{
font-size:13px;
color:#aaa;
margin-top:5px;
}

/* HERO */

.hero{
text-align:center;
padding:80px 20px;
}

.hero h1{
font-size:50px;
margin-bottom:20px;
}

.hero p{
color:#bbb;
max-width:600px;
margin:auto;
line-height:1.6;
}

/* BUTTON */

.btn{
display:inline-block;
margin-top:30px;
background:#1db954;
padding:12px 30px;
border-radius:30px;
text-decoration:none;
color:white;
transition:0.3s;
}

.btn:hover{
background:#17a44b;
transform:scale(1.05);
}

/* FOOTER */

footer{
text-align:center;
padding:30px;
color:#888;
border-top:1px solid #2a2a2a;
margin-top:50px;
}

/* animation */

.fade{
opacity:0;
transform:translateY(30px);
transition:0.8s;
}

.fade.show{
opacity:1;
transform:translateY(0);
}

</style>
</head>

<body>

<nav>

<div class="logo">SoundWave</div>

<ul>
<li><a href="{% url 'core:home' %}">Home</a></li>
<li><a href="{% url 'artist:artist' %}">Artists</a></li>
<li><a href="{% url 'music:music' %}">Albums</a></li>
</ul>

</nav>

<div class="container">

{% block content %}

{% endblock %}

</div>

<footer>
© 2026 SoundWave Music Store
</footer>

<script>

const elements = document.querySelectorAll('.fade');

const observer = new IntersectionObserver(entries=>{
entries.forEach(entry=>{
if(entry.isIntersecting){
entry.target.classList.add('show');
}
});
});

elements.forEach(el=>observer.observe(el));

</script>

</body>
</html>
