{% extends 'partials/base.html' %}

{% block content %}

<h1 style="margin-bottom:30px;">Artists</h1>

<div class="grid">

{% for artist in artists %}

<div class="card fade">

<img src="{{ artist.image.url }}" alt="artist">

<div class="card-body">

<div class="card-title">{{ artist.name }}</div>

<div class="card-sub">
{{ artist.genre }}
</div>

</div>

</div>

{% endfor %}

</div>

{% endblock %}
